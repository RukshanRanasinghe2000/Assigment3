openapi: 3.0.3
info:
  title: Purchase Management API
  description: REST API for managing purchase bills, items, locations, and audit logs.
  version: 1.0.0

servers:
  - url: http://localhost:5000
    description: Local development server

tags:
  - name: Purchase Bills
    description: Create, retrieve, and update purchase bills
  - name: Items
    description: Retrieve available items
  - name: Locations
    description: Retrieve available locations
  - name: Audit Logs
    description: Retrieve audit history for purchase bill operations

paths:

  /api/purchase-bill:
    get:
      tags: [Purchase Bills]
      summary: Get all purchase bills
      operationId: getAllPurchaseBills
      responses:
        '200':
          description: List of purchase bills ordered by creation date descending
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PurchaseBillDto'

    post:
      tags: [Purchase Bills]
      summary: Create a new purchase bill
      operationId: createPurchaseBill
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePurchaseBillDto'
      responses:
        '201':
          description: Purchase bill created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseBillDto'
          headers:
            Location:
              description: URL of the newly created resource
              schema:
                type: string

  /api/purchase-bill/{id}:
    get:
      tags: [Purchase Bills]
      summary: Get a purchase bill by ID
      operationId: getPurchaseBillById
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Purchase bill found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseBillDto'
        '404':
          description: Purchase bill not found

    put:
      tags: [Purchase Bills]
      summary: Update an existing purchase bill
      operationId: updatePurchaseBill
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePurchaseBillDto'
      responses:
        '200':
          description: Purchase bill updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseBillDto'
        '404':
          description: Purchase bill not found

  /api/items:
    get:
      tags: [Items]
      summary: Get all items
      operationId: getAllItems
      responses:
        '200':
          description: List of items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ItemDto'

  /api/locations:
    get:
      tags: [Locations]
      summary: Get all locations
      operationId: getAllLocations
      responses:
        '200':
          description: List of locations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LocationDto'

  /api/audit-logs:
    get:
      tags: [Audit Logs]
      summary: Get all audit logs
      operationId: getAllAuditLogs
      responses:
        '200':
          description: List of audit log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditLogDto'

components:

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      description: Resource identifier
      schema:
        type: integer
        format: int32
        minimum: 1

  schemas:

    PurchaseBillDto:
      type: object
      description: A purchase bill with its line items
      properties:
        id:
          type: integer
          format: int32
          readOnly: true
        billNumber:
          type: string
          example: "PB-2026-001"
        billDate:
          type: string
          format: date-time
          example: "2026-04-06T00:00:00Z"
        supplierName:
          type: string
          example: "Acme Supplies Ltd"
        notes:
          type: string
          example: "Quarterly stock replenishment"
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          nullable: true
          readOnly: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/PurchaseBillItemDto'
      required:
        - billNumber
        - billDate
        - supplierName
        - items

    PurchaseBillItemDto:
      type: object
      description: A line item within a purchase bill (response shape)
      properties:
        id:
          type: integer
          format: int32
          readOnly: true
        itemId:
          type: integer
          format: int32
        itemName:
          type: string
          readOnly: true
        locationId:
          type: integer
          format: int32
        locationName:
          type: string
          readOnly: true
        cost:
          type: number
          format: decimal
          example: 10.50
        price:
          type: number
          format: decimal
          example: 15.00
        quantity:
          type: integer
          format: int32
          example: 5
        discountPercent:
          type: number
          format: decimal
          example: 5.0
        totalCost:
          type: number
          format: decimal
          readOnly: true
          description: "(cost * quantity) - (cost * quantity * discountPercent / 100)"
        totalSelling:
          type: number
          format: decimal
          readOnly: true
          description: "price * quantity"
      required:
        - itemId
        - locationId
        - cost
        - price
        - quantity
        - discountPercent

    CreatePurchaseBillDto:
      type: object
      description: Payload for creating or updating a purchase bill
      properties:
        billNumber:
          type: string
          example: "PB-2026-001"
        billDate:
          type: string
          format: date-time
          example: "2026-04-06T00:00:00Z"
        supplierName:
          type: string
          example: "Acme Supplies Ltd"
        notes:
          type: string
          example: "Quarterly stock replenishment"
        items:
          type: array
          items:
            $ref: '#/components/schemas/CreatePurchaseBillItemDto'
          minItems: 1
      required:
        - billNumber
        - billDate
        - supplierName
        - items

    CreatePurchaseBillItemDto:
      type: object
      description: Payload for a single line item when creating or updating a bill
      properties:
        itemId:
          type: integer
          format: int32
          example: 1
        locationId:
          type: integer
          format: int32
          example: 2
        cost:
          type: number
          format: decimal
          example: 10.50
        price:
          type: number
          format: decimal
          example: 15.00
        quantity:
          type: integer
          format: int32
          minimum: 1
          example: 5
        discountPercent:
          type: number
          format: decimal
          minimum: 0
          maximum: 100
          example: 5.0
      required:
        - itemId
        - locationId
        - cost
        - price
        - quantity
        - discountPercent

    ItemDto:
      type: object
      description: A purchasable item
      properties:
        id:
          type: integer
          format: int32
          readOnly: true
        name:
          type: string
          example: "Office Chair"
      required:
        - name

    LocationDto:
      type: object
      description: A storage or delivery location
      properties:
        id:
          type: integer
          format: int32
          readOnly: true
        code:
          type: string
          example: "WH-01"
        name:
          type: string
          example: "Main Warehouse"
      required:
        - code
        - name

    AuditLogDto:
      type: object
      description: A record of a create or update operation on a purchase bill
      properties:
        id:
          type: integer
          format: int32
          readOnly: true
        entity:
          type: string
          example: "PurchaseBill"
        action:
          type: string
          enum: [Create, Update]
          example: "Create"
        oldValue:
          type: string
          nullable: true
          description: JSON snapshot of the entity before the change
        newValue:
          type: string
          nullable: true
          description: JSON snapshot of the entity after the change
        createdAt:
          type: string
          format: date-time
          readOnly: true
      required:
        - entity
        - action
        - createdAt
