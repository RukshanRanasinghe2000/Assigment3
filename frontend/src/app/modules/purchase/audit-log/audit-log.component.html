<div class="page-container">
  <div class="page-header">
    <h2>Audit Logs</h2>
  </div>

  <div *ngIf="loading" class="loading">Loading...</div>

  <table *ngIf="!loading" class="erp-table">
    <thead>
      <tr>
        <th>ID</th>
        <th>Entity</th>
        <th>Action</th>
        <th>Date</th>
        <th>Details</th>
      </tr>
    </thead>
    <tbody>
      <ng-container *ngFor="let log of logs">
        <tr>
          <td>{{ log.id }}</td>
          <td>{{ log.entity }}</td>
          <td><span class="badge" [class.badge-create]="log.action==='Create'" [class.badge-update]="log.action==='Update'">{{ log.action }}</span></td>
          <td>{{ log.createdAt | date:'medium' }}</td>
          <td><button class="btn btn-sm btn-ghost" (click)="toggle(log.id)">{{ expanded === log.id ? 'Hide' : 'View' }}</button></td>
        </tr>
        <tr *ngIf="expanded === log.id" class="detail-row">
          <td colspan="5">
            <div class="diff-grid">
              <div *ngIf="log.oldValue">
                <strong>Old Value</strong>
                <pre>{{ log.oldValue | json }}</pre>
              </div>
              <div>
                <strong>New Value</strong>
                <pre>{{ log.newValue | json }}</pre>
              </div>
            </div>
          </td>
        </tr>
      </ng-container>
    </tbody>
  </table>

  <div *ngIf="!loading && logs.length === 0" class="empty-state">No audit logs yet.</div>
</div>
